name: Feature request
description: Suggest an improvement or a new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why would this help?

  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Share UI ideas, technical thoughts, or examples if helpful.

