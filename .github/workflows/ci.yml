name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/build-menu-app.sh
          bash -n scripts/package-release.sh

      - name: Validate scheduler syntax
        run: python -m py_compile src/scheduler.py

      - name: Build menu app
        run: ./scripts/build-menu-app.sh

      - name: Build installer app
        run: ./scripts/build-installer-app.sh

      - name: Build release archive
        run: ./scripts/package-release.sh ci
