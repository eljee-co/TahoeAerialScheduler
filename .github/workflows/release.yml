name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.1"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/build-menu-app.sh
          bash -n scripts/build-installer-app.sh
          bash -n scripts/package-release.sh

      - name: Validate scheduler syntax
        run: python -m py_compile src/scheduler.py

      - name: Build DMG release artifact
        run: ./scripts/package-release.sh "${{ steps.release_tag.outputs.value }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        shell: bash
        run: |
          DMG_PATH="dist/TahoeAerialScheduler-${RELEASE_TAG}.dmg"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${DMG_PATH}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${DMG_PATH}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
